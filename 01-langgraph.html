      @import url("https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;700&display=swap");

      body {
        font-family: "Inter", sans-serif;
        background-color: #030712;
        color: #f3f4f6;
      }

      .font-mono {
        font-family: "Fira Code", monospace;
      }

      /* Scrollbar Personalizada */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #111827;
      }
      ::-webkit-scrollbar-thumb {
        background: #374151;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ea580c;
      }

      /* Navegação */
      .nav-link {
        transition: all 0.2s ease;
        border-left: 3px solid transparent;
      }
      .nav-link.active {
        background-color: #111827;
        border-left-color: #ea580c;
        color: #ea580c;
      }

      /* Animações */
      .fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Estilo Code */
      pre {
        background-color: #0f172a;
        border: 1px solid #1e293b;
        padding: 1rem;
        border-radius: 0.5rem;
        font-size: 0.8rem;
        color: #cbd5e1;
        overflow-x: auto;
      }

      /* Simulador de Grafo */
      .node {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .node-active {
        border-color: #ea580c !important;
        box-shadow: 0 0 20px rgba(234, 88, 12, 0.4);
        transform: scale(1.05);
      }
      .node-hitl {
        border-color: #3b82f6 !important;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
      }

      .modal-overlay {
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(4px);
      }
    </style>
  </head>

    <main class="flex-1 overflow-y-auto bg-gray-950 relative" id="content-area">

    <!-- Templates Section -->
    <template id="template-intro">
      <div class="p-8 md:p-12 max-w-4xl mx-auto fade-in">
        <span
          class="text-orange-500 text-xs font-bold uppercase tracking-widest"
          >Conceito Básico</span
        >
        <h2 class="text-4xl font-bold text-white mt-2 mb-6">
          Introdução aos Grafos Computacionais
        </h2>
        <p class="text-gray-400 leading-relaxed mb-8">
          Para engenheiros bancários, o LangGraph não é apenas uma biblioteca de
          IA; é uma estrutura para construir **Máquinas de Estado Finito
          Estocásticas**. Em fluxos críticos (crédito, fraude), não podemos
          aceitar o "caos" de um agente puramente autônomo. Precisamos de
          controle.
        </p>

        <div class="grid md:grid-cols-2 gap-6 mb-12">
          <div class="bg-gray-900 border border-gray-800 p-6 rounded-xl">
            <h4 class="text-orange-500 font-bold mb-3">
              <i class="fas fa-dot-circle mr-2"></i>Nós (Nodes)
            </h4>
            <p class="text-sm text-gray-500">
              Unidades de computação. No LangGraph, cada Nó é uma função Python
              que recebe o estado atual e retorna uma atualização.
            </p>
          </div>
          <div class="bg-gray-900 border border-gray-800 p-6 rounded-xl">
            <h4 class="text-blue-500 font-bold mb-3">
              <i class="fas fa-project-diagram mr-2"></i>Arestas (Edges)
            </h4>
            <p class="text-sm text-gray-500">
              As regras de transição. Podem ser determinísticas (A -> B) ou
              condicionais (se X, então C; senão D).
            </p>
          </div>
        </div>

        <div class="bg-gray-800/50 border border-gray-700 p-6 rounded-xl">
          <h4 class="text-white font-bold mb-4">Arquitetura de Ciclo</h4>
          <p class="text-sm text-gray-400 mb-4">
            Diferente de sistemas tradicionais, agentes precisam de **loops de
            reflexão**. Se um dado está faltando para a aprovação de crédito, o
            grafo deve ser capaz de voltar ao nó de coleta.
          </p>
          <div
            class="flex justify-center p-6 bg-gray-950 rounded-lg border border-gray-800"
          >
            <!-- Diagrama de Grafo Bancário -->
            <div class="relative w-full max-w-md">
              <!-- Nós do Grafo -->
              <div class="flex flex-col items-center space-y-8">
                <!-- START -->
                <div
                  class="w-24 h-12 bg-green-600 rounded-lg flex items-center justify-center text-white text-xs font-bold"
                >
                  START
                </div>

                <!-- Seta para baixo -->
                <div class="w-0.5 h-6 bg-gray-600"></div>

                <!-- Coleta de Dados -->
                <div
                  class="w-32 h-12 bg-blue-600 rounded-lg flex items-center justify-center text-white text-xs font-bold text-center"
                >
                  Coleta<br />Dados
                </div>

                <!-- Seta para baixo -->
                <div class="w-0.5 h-6 bg-gray-600"></div>

                <!-- Scoring -->
                <div
                  class="w-32 h-12 bg-purple-600 rounded-lg flex items-center justify-center text-white text-xs font-bold"
                >
                  Scoring
                </div>

                <!-- Decisão Condicional -->
                <div class="relative">
                  <div class="w-0.5 h-6 bg-gray-600"></div>
                  <div
                    class="w-20 h-20 bg-yellow-600 transform rotate-45 flex items-center justify-center text-white text-xs font-bold"
                  >
                    <span class="transform -rotate-45">Score<br />OK?</span>
                  </div>
                </div>

                <!-- Setas e Nós de Decisão -->
                <div class="flex items-center space-x-16 mt-8">
                  <!-- Caminho SIM -->
                  <div class="flex flex-col items-center space-y-4">
                    <div class="text-green-400 text-xs font-bold">SIM</div>
                    <div
                      class="w-24 h-12 bg-green-600 rounded-lg flex items-center justify-center text-white text-xs font-bold text-center"
                    >
                      Aprovado
                    </div>
                  </div>

                  <!-- Caminho NÃO (Loop) -->
                  <div class="flex flex-col items-center space-y-4">
                    <div class="text-red-400 text-xs font-bold">NÃO</div>
                    <div
                      class="w-24 h-12 bg-orange-600 rounded-lg flex items-center justify-center text-white text-xs font-bold text-center"
                    >
                      Coletar<br />Mais
                    </div>
                    <!-- Seta de volta (representando o loop) -->
                    <div class="flex items-center">
                      <div class="w-16 h-0.5 bg-gray-600"></div>
                      <div class="text-gray-400 text-xs ml-2">↰ Loop</div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Seta de loop visual -->
              <div
                class="absolute top-40 right-4 w-12 h-32 border-2 border-dashed border-orange-500 rounded-r-full opacity-60"
              ></div>
            </div>
          </div>
          <p class="text-center text-xs text-gray-500 mt-4 italic">
            Exemplo: Grafo com ciclo para refinamento de dados
          </p>
        </div>
      </div>
    </template>

    <template id="template-vs">
      <div class="p-8 md:p-12 max-w-5xl mx-auto fade-in">
        <h2 class="text-3xl font-bold text-white mb-8 text-center">
          LangChain vs. LangGraph
        </h2>
        <div class="grid md:grid-cols-2 gap-8 items-stretch">
          <!-- LangChain -->
          <div
            class="bg-gray-900/50 border border-gray-800 rounded-2xl p-8 relative overflow-hidden group"
          >
            <div
              class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity"
            >
              <i class="fas fa-link text-6xl"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-400 mb-4">
              LangChain (Chains)
            </h3>
            <ul class="space-y-4 mb-8">
              <li class="flex items-start gap-3 text-sm text-gray-500">
                <i class="fas fa-check text-green-500 mt-1"></i> Sequência
                Linear (DAG)
              </li>
              <li class="flex items-start gap-3 text-sm text-gray-500">
                <i class="fas fa-check text-green-500 mt-1"></i> Foco em
                "Caminho Feliz"
              </li>
              <li class="flex items-start gap-3 text-sm text-gray-500">
                <i class="fas fa-times text-red-500 mt-1"></i> Difícil
                implementar ciclos/repetição
              </li>
              <li class="flex items-start gap-3 text-sm text-gray-500">
                <i class="fas fa-times text-red-500 mt-1"></i> Sem persistência
                nativa de sessão
              </li>
            </ul>
            <pre class="text-[10px]">
# Pseudocódigo Chain
chain = prompt | model | parser
response = chain.invoke(input)</pre
            >
          </div>

          <!-- LangGraph -->
          <div
            class="bg-orange-900/10 border-2 border-orange-500/50 rounded-2xl p-8 relative overflow-hidden group"
          >
            <div
              class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity"
            >
              <i class="fas fa-sync text-6xl text-orange-500"></i>
            </div>
            <h3 class="text-xl font-bold text-orange-400 mb-4">
              LangGraph (State Machines)
            </h3>
            <ul class="space-y-4 mb-8">
              <li class="flex items-start gap-3 text-sm text-gray-300">
                <i class="fas fa-check text-orange-500 mt-1"></i> Suporte nativo
                a Ciclos
              </li>
              <li class="flex items-start gap-3 text-sm text-gray-300">
                <i class="fas fa-check text-orange-500 mt-1"></i> Gestão de
                Estado Global
              </li>
              <li class="flex items-start gap-3 text-sm text-gray-300">
                <i class="fas fa-check text-orange-500 mt-1"></i> Persistência
                em DB (Checkpointers)
              </li>
              <li class="flex items-start gap-3 text-sm text-gray-300">
                <i class="fas fa-check text-orange-500 mt-1"></i> Intervenção
                Humana (Breakpoints)
              </li>
            </ul>
            <pre class="text-[10px]">
# Pseudocódigo Graph
workflow = StateGraph(MyState)
workflow.add_node("agent", call_model)
workflow.add_edge("agent", END)</pre
            >
          </div>
        </div>
        <p class="text-center text-gray-500 text-xs mt-8 italic">
          Engenheiros Sêniores escolhem LangGraph para fluxos que exigem
          auditoria e controle de falhas.
        </p>
      </div>
    </template>

    <template id="template-state">
      <div class="p-8 md:p-12 max-w-4xl mx-auto fade-in">
        <h2 class="text-3xl font-bold text-white mb-6">
          Gestão de Estado Profunda
        </h2>
        <p class="text-gray-400 mb-8">
          O **State** é um dicionário tipado que evolui. No LangGraph, nós não
          "mudamos" o estado; nós retornamos atualizações que são aplicadas ao
          estado via **Redutores**.
        </p>

        <div class="space-y-6">
          <div>
            <h4 class="text-xs font-bold text-gray-500 uppercase mb-3">
              Definição do Schema (Pydantic / TypedDict)
            </h4>
            <pre>
from typing import TypedDict, Annotated
from langgraph.graph import add_messages

class CreditState(TypedDict):
    # 'Annotated' permite usar funções de redução (ex: append nas mensagens)
    messages: Annotated[list, add_messages] 
    risk_score: int
    manual_approval: bool
    data_points: dict</pre
            >
          </div>

          <div class="bg-gray-900 border border-gray-800 p-6 rounded-xl">
            <h4 class="text-white font-bold mb-3">
              Persistência (Checkpointers)
            </h4>
            <p class="text-sm text-gray-400 mb-4">
              Imagine que um agente de crédito pare no meio de uma análise. Com
              Checkpointers, você salva o `thread_id` no banco. Quando o usuário
              volta 3 dias depois, o agente continua do bit exato onde parou.
            </p>
            <div class="flex items-center gap-4">
              <div
                class="bg-gray-950 p-3 rounded font-mono text-[10px] text-green-400 border border-gray-700"
              >
                saver = SqliteSaver.from_conn_string(":memory:")<br />
                app = workflow.compile(checkpointer=saver)
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <template id="template-hitl">
      <div class="p-8 md:p-12 max-w-4xl mx-auto fade-in">
        <h2 class="text-3xl font-bold text-white mb-6">
          Human-In-The-Loop (HITL)
        </h2>
        <div
          class="bg-blue-900/10 border border-blue-500/30 p-6 rounded-xl mb-8"
        >
          <p class="text-blue-200 text-sm leading-relaxed">
            Em bancos, decisões autônomas de alto risco são proibidas. O
            LangGraph resolve isso com **Breakpoints**. O grafo pausa a execução
            *antes* de um nó crítico, aguardando que um humano valide ou edite o
            estado.
          </p>
        </div>

        <div class="grid md:grid-cols-3 gap-4 mb-8">
          <div class="p-4 bg-gray-900 rounded-lg text-center">
            <i class="fas fa-pause-circle text-orange-500 mb-2"></i>
            <p class="text-xs font-bold text-white">Interrupt Before</p>
            <p class="text-[10px] text-gray-500">Pausa antes do Nó</p>
          </div>
          <div class="p-4 bg-gray-900 rounded-lg text-center">
            <i class="fas fa-edit text-blue-500 mb-2"></i>
            <p class="text-xs font-bold text-white">State Update</p>
            <p class="text-[10px] text-gray-500">Humano edita dados</p>
          </div>
          <div class="p-4 bg-gray-900 rounded-lg text-center">
            <i class="fas fa-play text-green-500 mb-2"></i>
            <p class="text-xs font-bold text-white">Resume Thread</p>
            <p class="text-[10px] text-gray-500">Fluxo continua</p>
          </div>
        </div>

        <pre class="mb-4">
# Configurando interrupção no compilador
app = workflow.compile(
    checkpointer=memory,
    interrupt_before=["approval_node"]
)</pre
        >
      </div>
    </template>

    <template id="template-architecture">
      <div class="p-8 md:p-12 max-w-6xl mx-auto fade-in">
        <span
          class="text-orange-500 text-xs font-bold uppercase tracking-widest"
          >Arquitetura Avançada</span
        >
        <h2 class="text-4xl font-bold text-white mt-2 mb-6">
          Grafos Distribuídos e Escalabilidade
        </h2>
        <p class="text-gray-400 leading-relaxed mb-8">
          Para sistemas bancários críticos, um único processo não é suficiente.
          Precisamos de <strong>Grafos Distribuídos</strong>
          que podem ser particionados, replicados e executados em clusters
          Kubernetes com garantias de consistência.
        </p>

        <!-- Grid de Conceitos Avançados -->
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
          <div class="bg-gray-900 border-l-4 border-orange-500 p-6 rounded-xl">
            <h4 class="text-orange-400 font-bold mb-3 flex items-center gap-2">
              <i class="fas fa-network-wired"></i>Graph Partitioning
            </h4>
            <p class="text-sm text-gray-400 mb-3">
              Dividir grafos grandes em subgrafos menores baseado em
              <code>customer_id</code> ou <code>region</code>. Cada partição
              roda em pods separados.
            </p>
            <div
              class="bg-gray-950 p-3 rounded text-xs font-mono text-green-400"
            >
              partition_key = hash(customer_id) % N_WORKERS
            </div>
          </div>

          <div class="bg-gray-900 border-l-4 border-blue-500 p-6 rounded-xl">
            <h4 class="text-blue-400 font-bold mb-3 flex items-center gap-2">
              <i class="fas fa-sync-alt"></i>Event Sourcing
            </h4>
            <p class="text-sm text-gray-400 mb-3">
              Cada mudança de estado é um evento imutável. Permite auditoria
              completa e replay de decisões.
            </p>
            <div
              class="bg-gray-950 p-3 rounded text-xs font-mono text-blue-400"
            >
              {"event": "score_calculated", "value": 750, "timestamp": "..."}
            </div>
          </div>

          <div class="bg-gray-900 border-l-4 border-purple-500 p-6 rounded-xl">
            <h4 class="text-purple-400 font-bold mb-3 flex items-center gap-2">
              <i class="fas fa-clock"></i>Temporal Workflows
            </h4>
            <p class="text-sm text-gray-400 mb-3">
              Integração com Temporal.io para workflows de longa duração (30+
              dias) com garantias de entrega.
            </p>
            <div
              class="bg-gray-950 p-3 rounded text-xs font-mono text-purple-400"
            >
              @workflow.defn class CreditWorkflow
            </div>
          </div>
        </div>

class EncryptedPostgresSaver(PostgresSaver):
    def __init__(self, conn_string: str, kms_key_id: str):

    def _encrypt_state(self, state: dict) -> bytes:

    def __init__(self, hyperledger_channel: str):
        self.channel = hyperledger_channel
        
    def record_decision(self, thread_id: str, decision_data: dict):
        # Criar hash da decisão
        decision_hash = hashlib.sha256(
            json.dumps(decision_data, sort_keys=True).encode()
        ).hexdigest()
        
        # Submeter para Hyperledger Fabric
        transaction = {
            "thread_id": thread_id,
            "timestamp": datetime.utcnow().isoformat(),
            "decision_hash": decision_hash,
            "node_path": decision_data["execution_path"],
            "final_state_hash": decision_data["state_hash"]
        }
        
        # Transação imutável no blockchain
        return self.submit_transaction(
            "record_credit_decision", 
            transaction
        )
        
    def verify_integrity(self, thread_id: str) -> bool:
        # Verificar se decisão não foi alterada
        blockchain_record = self.query_decision(thread_id)
        current_state = self.rebuild_state_from_events(thread_id)
        
        return blockchain_record["state_hash"] == \
               self.hash_state(current_state)</code></pre>

from asyncio import Semaphore

class IntelligentConnectionPool:
    def __init__(self):
        self.pools = {
            'spc': self._create_pool('https://api.spc.gov.br', 50),
            'serasa': self._create_pool('https://api.serasa.com', 30),
            'bacen': self._create_pool('https://api.bcb.gov.br', 20)
        }
        
    def _create_pool(self, base_url: str, max_conn: int):
        return {
            'session': ClientSession(
                base_url=base_url,
                connector=aiohttp.TCPConnector(
                    limit=max_conn,
                    limit_per_host=max_conn,
                    keepalive_timeout=30
                )
            ),
            'semaphore': Semaphore(max_conn),
            'circuit': CircuitBreaker(failure_threshold=5)
        }
        
    async def call_api(self, service: str, endpoint: str, data: dict):
        pool = self.pools[service]
        
        async with pool['semaphore']:  # Rate limiting
            try:
                return await pool['circuit'].call(
                    self._make_request, pool['session'], endpoint, data
                )
            except CircuitBreakerOpenException:
                # Usar cache ou fallback
                return await self._get_cached_response(service, data)
                
# Uso em nós do grafo

    spc_data, serasa_data = await asyncio.gather(
        spc_task, serasa_task, return_exceptions=True
    )
    
    return {'external_scores': {'spc': spc_data, 'serasa': serasa_data}}</code></pre>

    <script>
      let currentStep = 0;
      let score = 0;

      function showSection(sectionId) {
        const area = document.getElementById("content-area");
        const template = document.getElementById(`template-${sectionId}`);

        // UI Updates
        document
          .querySelectorAll(".nav-link")
          .forEach((btn) => btn.classList.remove("active"));
        document.getElementById(`btn-${sectionId}`).classList.add("active");

        area.innerHTML = "";
        area.appendChild(template.content.cloneNode(true));

        if (sectionId === "lab") {
          currentStep = 0;
          updateStateDisplay({ status: "idle" });
        }
      }

      function updateStateDisplay(state) {
        const display = document.getElementById("state-display");
        if (display) display.innerText = JSON.stringify(state, null, 2);
      }

      function runSimulation() {
        const btn = document.getElementById("btn-run");

        if (currentStep === 0) {
          // Step Ingest
          currentStep = 1;
          document.getElementById("n-ingest").classList.add("node-active");
          updateStateDisplay({ status: "ingesting", customer: "Empresa XPTO" });
          btn.innerHTML = '<i class="fas fa-forward"></i> Calcular Scoring';
        } else if (currentStep === 1) {
          // Step Score
          currentStep = 2;
          score = Math.floor(Math.random() * (900 - 300) + 300);
          document.getElementById("n-score").classList.add("node-active");
          document.getElementById("score-val").classList.remove("hidden");
          document.getElementById("score-val").innerText = `SCORE: ${score}`;
          updateStateDisplay({ status: "scoring_done", score: score });
          btn.innerHTML = '<i class="fas fa-code-branch"></i> Decidir Caminho';
        } else if (currentStep === 2) {
          // Logic Path
          if (score > 800) {
            // Auto approve
            document.getElementById("n-auto").classList.add("node-active");
            finishLab(true);
          } else {
            // HITL
            document.getElementById("n-hitl").classList.remove("opacity-40");
            document.getElementById("n-hitl").classList.add("node-hitl");
            document.getElementById("hitl-badge").classList.remove("hidden");
            document.getElementById("modal-score").innerText = score;

            setTimeout(() => {
              document.getElementById("hitl-modal").classList.remove("hidden");
            }, 500);
          }
        }
      }

      function handleHitl(approve) {
        document.getElementById("hitl-modal").classList.add("hidden");
        updateStateDisplay({
          status: "human_decided",
          approved: approve,
          score: score,
        });
        finishLab(approve);
      }

      function finishLab(approved) {
        document.getElementById("n-end").classList.add("node-active");
        const btn = document.getElementById("btn-run");
        btn.disabled = true;
        btn.className =
          "w-full bg-gray-800 text-gray-500 font-bold py-4 rounded-xl cursor-not-allowed";
        btn.innerHTML = approved
          ? '<i class="fas fa-check"></i> CRÉDITO APROVADO'
          : '<i class="fas fa-times"></i> CRÉDITO NEGADO';
      }

      function resetLab() {
        showSection("lab");
      }

      // Init
      document.addEventListener("DOMContentLoaded", () => {
        showSection("intro");
      });
    </script>
