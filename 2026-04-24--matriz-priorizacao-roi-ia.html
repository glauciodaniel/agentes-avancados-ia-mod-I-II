<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Priorização e Valor em Projetos de IA | Workshop Executivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }
      .font-mono {
        font-family: "JetBrains Mono", monospace;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      .nav-item {
        border-left: 3px solid transparent;
        transition: all 0.2s ease;
      }
      .nav-item:hover {
        background: rgba(59, 130, 246, 0.1);
      }
      .nav-item.active {
        border-left-color: #3b82f6;
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
      }

      .submenu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }
      .submenu.open {
        max-height: 600px;
      }
      .submenu-item {
        font-size: 0.8rem;
        padding: 0.5rem 1rem 0.5rem 3rem;
      }

      .card {
        background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
        border: 1px solid #334155;
        transition: all 0.3s ease;
      }
      .card:hover {
        border-color: #3b82f6;
        transform: translateY(-2px);
        box-shadow: 0 8px 30px -10px rgba(59, 130, 246, 0.3);
      }

      .code-block {
        background: #0c0f14;
        border: 1px solid #1e293b;
        border-radius: 8px;
        font-family: "JetBrains Mono", monospace;
      }

      .fade-in {
        animation: fadeIn 0.4s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Interactive: Scoring Calculator */
      .calc-row input[type="range"] {
        width: 100%;
        accent-color: #3b82f6;
      }
      .verdict.go {
        background: #16a34a;
        color: #fff;
      }
      .verdict.piloto {
        background: #d97706;
        color: #fff;
      }
      .verdict.nogo {
        background: #dc2626;
        color: #fff;
      }

      /* Rubric table */
      .rubric th,
      .rubric td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid #334155;
        vertical-align: top;
      }
      .rubric th {
        background: #1e293b;
        color: #60a5fa;
        font-weight: 700;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .rubric td:first-child {
        font-weight: 700;
        color: #fff;
        width: 180px;
      }
      .rubric .score-col {
        width: 70px;
        text-align: center;
        font-weight: 700;
        color: #60a5fa;
      }

      /* Tree / decision flow */
      .pill.buy {
        background: #16a34a;
      }
      .pill.rag {
        background: #3b82f6;
      }
      .pill.build {
        background: #7c3aed;
      }
    </style>
  </head>
  <body class="flex flex-col h-screen overflow-hidden">
    <!-- Header Navbar -->
    <header
      class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center justify-between z-30"
    >
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center"
          >
            <i class="fas fa-chart-line text-white"></i>
          </div>
          <div>
            <h1 class="text-lg font-bold text-white">
              Priorização & ROI em IA
            </h1>
            <p
              class="text-[10px] text-slate-500 font-semibold uppercase tracking-widest"
            >
              Workshop Executivo · 60-90 min
            </p>
          </div>
        </div>
      </div>
      <nav class="flex gap-3">
        <button
          onclick="window.print()"
          class="px-4 py-2 bg-slate-700/40 text-slate-300 hover:bg-slate-700/60 rounded-lg text-sm font-semibold transition-all"
        >
          <i class="fas fa-print mr-2"></i>Imprimir
        </button>
        <button
          onclick="router('lab/ficha')"
          class="px-4 py-2 bg-green-600/20 text-green-400 hover:bg-green-600/30 rounded-lg text-sm font-semibold transition-all"
        >
          <i class="fas fa-clipboard-check mr-2"></i>Ficha de Avaliação
        </button>
      </nav>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- Sidebar -->
      <aside
        class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col flex-shrink-0 overflow-y-auto"
      >
        <!-- Workshop Info -->
        <div
          class="p-4 mx-4 mt-4 bg-blue-600/10 border border-blue-600/30 rounded-xl"
        >
          <div
            class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mb-1"
          >
            Workshop Executivo
          </div>
          <div class="text-sm font-bold text-white leading-tight">
            Priorização e Valor em Projetos de IA
          </div>
          <div class="text-xs text-slate-400 mt-2">
            <i class="fas fa-clock mr-1"></i> 60-90 min · Hands-on
          </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 py-4">
          <div class="px-4 mb-2">
            <span
              class="text-[10px] font-bold text-slate-500 uppercase tracking-widest"
              >Navegação</span
            >
          </div>
          <ul class="space-y-1 px-2">
            <li>
              <button
                onclick="router('dashboard')"
                id="nav-dashboard"
                class="nav-item active w-full text-left px-4 py-3 rounded-lg text-sm font-medium"
              >
                <i class="fas fa-home w-6 text-slate-400"></i> Visão Geral
              </button>
            </li>

            <!-- Contexto -->
            <li>
              <button
                onclick="toggleSubmenu('contexto')"
                class="nav-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium flex items-center justify-between"
              >
                <span
                  ><i class="fas fa-exclamation-circle w-6 text-slate-400"></i>
                  Contexto</span
                >
                <i
                  class="fas fa-chevron-down text-slate-500 transition-transform"
                  id="icon-contexto"
                ></i>
              </button>
              <ul class="submenu" id="submenu-contexto">
                <li>
                  <button
                    onclick="router('contexto/problema')"
                    class="submenu-item nav-item w-full text-left text-slate-400 hover:text-white"
                  >
                    O Problema Real
                  </button>
                </li>
                <li>
                  <button
                    onclick="router('contexto/custos')"
                    class="submenu-item nav-item w-full text-left text-slate-400 hover:text-white"
                  >
                    Custo da Não-Priorização
                  </button>
                </li>
              </ul>
            </li>

            <!-- Metodologia -->
            <li>
              <button
                onclick="toggleSubmenu('metodologia')"
                class="nav-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium flex items-center justify-between"
              >
                <span
                  ><i class="fas fa-sitemap w-6 text-slate-400"></i>
                  Metodologia</span
                >
                <i
                  class="fas fa-chevron-down text-slate-500 transition-transform"
                  id="icon-metodologia"
                ></i>
              </button>
              <ul class="submenu" id="submenu-metodologia">
                <li>
                  <button
                    onclick="router('metodologia/taxonomia')"
                    class="submenu-item nav-item w-full text-left text-slate-400 hover:text-white"
                  >
                    Taxonomia de Soluções
                  </button>
                </li>
                <li>
                  <button
                    onclick="router('metodologia/rubrica')"
                    class="submenu-item nav-item w-full text-left text-slate-400 hover:text-white"
                  >
                    Rubrica de Scoring
                  </button>
                </li>
                <li>
                  <button
                    onclick="router('metodologia/matriz')"
                    class="submenu-item nav-item w-full text-left text-slate-400 hover:text-white"
                  >
                    Matriz & Nota de Corte
                  </button>
                </li>
              </ul>
            </li>

            <!-- Valor e ROI -->
            <li>
              <button
                onclick="toggleSubmenu('valor')"
                class="nav-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium flex items-center justify-between"
              >
                <span
                  ><i class="fas fa-dollar-sign w-6 text-slate-400"></i> Valor &
                  ROI</span
                >
                <i
                  class="fas fa-chevron-down text-slate-500 transition-transform"
                  id="icon-valor"
                ></i>
              </button>
              <ul class="submenu" id="submenu-valor">
                <li>
                  <button
                    onclick="router('valor/roi')"
                    class="submenu-item nav-item w-full text-left text-slate-400 hover:text-white"
                  >
                    Além da Fórmula Simples
                  </button>
                </li>
                <li>
                  <button
                    onclick="router('valor/caso')"
                    class="submenu-item nav-item w-full text-left text-slate-400 hover:text-white"
                  >
                    Caso: Triagem RH
                  </button>
                </li>
              </ul>
            </li>

            <!-- Governança -->
            <li>
              <button
                onclick="toggleSubmenu('governanca')"
                class="nav-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium flex items-center justify-between"
              >
                <span
                  ><i class="fas fa-shield-halved w-6 text-slate-400"></i>
                  Governança</span
                >
                <i
                  class="fas fa-chevron-down text-slate-500 transition-transform"
                  id="icon-governanca"
                ></i>
              </button>
              <ul class="submenu" id="submenu-governanca">
                <li>
                  <button
                    onclick="router('governanca/gonogo')"
                    class="submenu-item nav-item w-full text-left text-slate-400 hover:text-white"
                  >
                    Go &amp; No-Go
                  </button>
                </li>
                <li>
                  <button
                    onclick="router('governanca/risco')"
                    class="submenu-item nav-item w-full text-left text-slate-400 hover:text-white"
                  >
                    Risco Regulatório
                  </button>
                </li>
                <li>
                  <button
                    onclick="router('governanca/makebuild')"
                    class="submenu-item nav-item w-full text-left text-slate-400 hover:text-white"
                  >
                    Make vs. Buy vs. RAG
                  </button>
                </li>
                <li>
                  <button
                    onclick="router('governanca/portfolio')"
                    class="submenu-item nav-item w-full text-left text-slate-400 hover:text-white"
                  >
                    Portfólio &amp; Adoção
                  </button>
                </li>
              </ul>
            </li>

            <!-- Laboratórios -->
            <li class="mt-2">
              <div class="px-4 mb-2">
                <span
                  class="text-[10px] font-bold text-slate-500 uppercase tracking-widest"
                  >Hands-on</span
                >
              </div>
            </li>
            <li>
              <button
                onclick="router('lab/scoring')"
                id="nav-lab-scoring"
                class="nav-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium flex items-center gap-2"
              >
                <i class="fas fa-sliders w-6 text-amber-400"></i>
                <span>Lab 1: Scoring Calculator</span>
              </button>
            </li>
            <li>
              <button
                onclick="router('lab/roi')"
                id="nav-lab-roi"
                class="nav-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium flex items-center gap-2"
              >
                <i class="fas fa-calculator w-6 text-amber-400"></i>
                <span>Lab 2: ROI Simulator</span>
              </button>
            </li>
            <li>
              <button
                onclick="router('lab/ficha')"
                id="nav-lab-ficha"
                class="nav-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium flex items-center gap-2"
              >
                <i class="fas fa-clipboard-check w-6 text-green-400"></i>
                <span>Ficha de Avaliação</span>
              </button>
            </li>
          </ul>
        </nav>

        <!-- Rodapé -->
        <div class="p-4 border-t border-slate-800">
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold"
            >
              <i class="fas fa-chalkboard-user"></i>
            </div>
            <div>
              <p class="text-sm font-semibold text-white">Workshop Executivo</p>
              <p class="text-[10px] text-green-400">
                <i class="fas fa-circle text-[6px] mr-1"></i> Filtro
                colaborativo
              </p>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 overflow-y-auto bg-slate-950" id="main-content">
        <!-- Content injected by JS -->
      </main>
    </div>

    <script>
      // ==================== STATE ====================
      let currentRoute = "dashboard";
      let openSubmenus = [];

      // ==================== NAVIGATION ====================
      function router(route) {
        currentRoute = route;
        document
          .querySelectorAll(".nav-item")
          .forEach((el) => el.classList.remove("active"));

        // Activar item atual (top-level ou submenu)
        const routeId = "nav-" + route.replace("/", "-");
        const activeEl = document.getElementById(routeId);
        if (activeEl) activeEl.classList.add("active");

        // Abrir submenu pai se aplicável
        const [section] = route.split("/");
        const parentSubmenu = document.getElementById(`submenu-${section}`);
        if (parentSubmenu && !parentSubmenu.classList.contains("open")) {
          toggleSubmenu(section);
        }

        const main = document.getElementById("main-content");
        main.innerHTML = "";
        main.scrollTop = 0;

        const [sec, sub] = route.split("/");

        switch (sec) {
          case "dashboard":
            renderDashboard(main);
            break;
          case "contexto":
            renderContexto(main, sub);
            break;
          case "metodologia":
            renderMetodologia(main, sub);
            break;
          case "valor":
            renderValor(main, sub);
            break;
          case "governanca":
            renderGovernanca(main, sub);
            break;
          case "lab":
            renderLab(main, sub);
            break;
          default:
            renderDashboard(main);
        }
      }

      function toggleSubmenu(name) {
        const submenu = document.getElementById(`submenu-${name}`);
        const icon = document.getElementById(`icon-${name}`);
        if (!submenu) return;

        if (submenu.classList.contains("open")) {
          submenu.classList.remove("open");
          if (icon) icon.style.transform = "rotate(0deg)";
          openSubmenus = openSubmenus.filter((s) => s !== name);
        } else {
          submenu.classList.add("open");
          if (icon) icon.style.transform = "rotate(180deg)";
          openSubmenus.push(name);
        }
      }

      // ==================== RENDERERS ====================
      function renderDashboard(container) {
        container.innerHTML = `
          <div class="p-8 fade-in">
            <div class="mb-8">
              <div class="text-blue-400 text-xs font-bold uppercase tracking-widest mb-2">
                <i class="fas fa-calendar-day mr-2"></i> Workshop Executivo · 60-90 min
              </div>
              <h1 class="text-4xl font-black text-white mb-3">Priorização e Valor em Projetos de IA</h1>
              <p class="text-slate-400 text-lg max-w-3xl">
                Ao final deste workshop, cada participante terá pontuado uma ideia real do backlog, estimado seu ROI e decidido seu destino: aprovar, pilotar ou descartar.
              </p>
            </div>

            <div class="grid grid-cols-4 gap-4 mb-8">
              ${[
                { label: "Duração", value: "60-90 min" },
                { label: "Formato", value: "Hands-on" },
                { label: "Blocos", value: "6" },
                { label: "Exercícios", value: "2 + Ficha" },
              ]
                .map(
                  (stat) => `
                <div class="card rounded-xl p-5">
                  <div class="text-slate-500 text-xs font-bold uppercase mb-1">${stat.label}</div>
                  <div class="text-2xl font-black text-white">${stat.value}</div>
                </div>
              `,
                )
                .join("")}
            </div>

            <div class="grid grid-cols-2 gap-6 mb-8">
              <div class="card rounded-xl p-6 border-l-4 border-l-red-500">
                <div class="flex items-center gap-2 mb-3">
                  <i class="fas fa-exclamation-triangle text-red-500"></i>
                  <span class="text-xs font-bold text-red-400 uppercase tracking-widest">Problema</span>
                </div>
                <p class="text-slate-300 text-sm leading-relaxed">
                  Ter ideias demais sem critério de priorização leva a <strong class="text-white">dispersão de squad</strong>, <strong class="text-white">pilotos eternos</strong> e <strong class="text-white">ROI nulo</strong>. Cerca de 80% dos projetos de IA não entregam o retorno previsto.
                </p>
              </div>
              <div class="card rounded-xl p-6 border-l-4 border-l-green-500">
                <div class="flex items-center gap-2 mb-3">
                  <i class="fas fa-check-circle text-green-500"></i>
                  <span class="text-xs font-bold text-green-400 uppercase tracking-widest">Solução</span>
                </div>
                <p class="text-slate-300 text-sm leading-relaxed">
                  Rubrica objetiva, matriz de scoring, simulador de ROI completo (TCO + payback + cost of delay) e ficha de submissão ao comitê. <strong class="text-white">Metodologia replicável</strong>.
                </p>
              </div>
            </div>

            <div class="card rounded-xl p-6 mb-8">
              <h3 class="text-lg font-bold text-white mb-6"><i class="fas fa-bullseye mr-2 text-blue-400"></i> Objetivos Mensuráveis</h3>
              <div class="grid grid-cols-2 gap-4">
                ${[
                  {
                    icon: "times-circle",
                    color: "red",
                    text: "Saber quando <strong>não</strong> usar IA",
                  },
                  {
                    icon: "stopwatch",
                    color: "blue",
                    text: "Pontuar qualquer ideia em menos de 5 min",
                  },
                  {
                    icon: "coins",
                    color: "amber",
                    text: "Estimar ROI com TCO realista (3 anos)",
                  },
                  {
                    icon: "clipboard-check",
                    color: "green",
                    text: "Sair com uma ficha preenchida pronta para o comitê",
                  },
                ]
                  .map(
                    (obj) => `
                  <div class="flex items-start gap-3 p-4 bg-slate-800/40 rounded-lg">
                    <i class="fas fa-${obj.icon} text-${obj.color}-400 text-lg mt-0.5"></i>
                    <p class="text-sm text-slate-300">${obj.text}</p>
                  </div>
                `,
                  )
                  .join("")}
              </div>
            </div>

            <div class="card rounded-xl p-6">
              <h3 class="text-lg font-bold text-white mb-6"><i class="fas fa-route mr-2 text-blue-400"></i> Roteiro do Workshop</h3>
              <div class="relative">
                <div class="absolute left-[5px] top-0 bottom-0 w-0.5 bg-slate-700"></div>
                <div class="space-y-4">
                  ${[
                    {
                      block: "Bloco 1",
                      title: "Contexto: por que priorizar",
                      duration: "10 min",
                      route: "contexto/problema",
                    },
                    {
                      block: "Bloco 2",
                      title: "Metodologia: taxonomia, rubrica e matriz",
                      duration: "15 min",
                      route: "metodologia/taxonomia",
                    },
                    {
                      block: "Bloco 3",
                      title: "Lab 1: Pontuar uma ideia (scoring)",
                      duration: "10 min",
                      route: "lab/scoring",
                      highlight: true,
                    },
                    {
                      block: "Bloco 4",
                      title: "Valor: ROI, payback e caso prático",
                      duration: "10 min",
                      route: "valor/roi",
                    },
                    {
                      block: "Bloco 5",
                      title: "Lab 2: Simular ROI da sua ideia",
                      duration: "10 min",
                      route: "lab/roi",
                      highlight: true,
                    },
                    {
                      block: "Bloco 6",
                      title: "Governança + ficha preenchida",
                      duration: "15 min",
                      route: "governanca/gonogo",
                    },
                  ]
                    .map(
                      (item) => `
                    <div class="flex gap-4 relative cursor-pointer group" onclick="router('${item.route}')">
                      <div class="w-3 h-3 rounded-full ${item.highlight ? "bg-amber-500" : "bg-blue-500"} mt-1.5 z-10"></div>
                      <div class="flex-1 pb-4 group-hover:bg-slate-800/40 rounded-lg px-3 -ml-3 py-1 transition-colors">
                        <div class="flex items-center gap-3 flex-wrap">
                          <span class="text-xs font-mono ${item.highlight ? "text-amber-400" : "text-blue-400"}">${item.block}</span>
                          <span class="text-white font-semibold">${item.title}</span>
                          <span class="text-xs text-slate-500">${item.duration}</span>
                          <i class="fas fa-arrow-right text-xs text-slate-600 group-hover:text-blue-400 transition-colors"></i>
                        </div>
                      </div>
                    </div>
                  `,
                    )
                    .join("")}
                </div>
              </div>
            </div>

            <div class="mt-6 card rounded-xl p-6 border-l-4 border-l-blue-500">
              <h3 class="text-lg font-bold text-blue-400 mb-3"><i class="fas fa-quote-left mr-2"></i> Tese do Workshop</h3>
              <p class="text-xl text-slate-200 leading-relaxed">
                Priorizar <strong class="text-white">não é escolher as melhores ideias</strong>. É dizer "não" a boas ideias para que as <strong class="text-white">extraordinárias</strong> possam receber squad, dados e sponsorship suficientes para terminar.
              </p>
            </div>
          </div>
        `;
      }

      function renderContexto(container, sub) {
        if (!sub || sub === "problema") {
          container.innerHTML = `
            <div class="p-8 fade-in">
              <div class="mb-8">
                <div class="text-blue-400 text-xs font-bold uppercase tracking-widest mb-2">
                  <i class="fas fa-exclamation-circle mr-2"></i> Contexto
                </div>
                <h1 class="text-4xl font-black text-white mb-3">O problema real</h1>
                <p class="text-slate-400 text-lg">Temos ideias demais. E a estatística global não é gentil com quem não prioriza.</p>
              </div>

              <div class="grid grid-cols-3 gap-6 mb-8">
                ${[
                  {
                    num: "~80%",
                    label: "Projetos de IA que falham",

                  <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">KPI de sucesso</label>
                    <input type="text" id="f-kpi" placeholder="Ex.: tempo médio de triagem reduzido em 45%"
                      class="w-full px-4 py-3 bg-slate-800 border border-slate-700 focus:border-blue-500 rounded-lg text-white outline-none">
                  </div>
                  <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Score da matriz</label>
                    <input type="number" id="f-score" min="10" max="50" placeholder="10-50"
                      class="w-full px-4 py-3 bg-slate-800 border border-slate-700 focus:border-blue-500 rounded-lg text-white outline-none">
                  </div>
                  <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">ROI estimado (horizonte 3 anos)</label>
                    <input type="text" id="f-roi" placeholder="Ex.: 145%"
                      class="w-full px-4 py-3 bg-slate-800 border border-slate-700 focus:border-blue-500 rounded-lg text-white outline-none">
                  </div>
                  <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Payback estimado</label>
                    <input type="text" id="f-payback" placeholder="Ex.: 9 meses"
                      class="w-full px-4 py-3 bg-slate-800 border border-slate-700 focus:border-blue-500 rounded-lg text-white outline-none">
                  </div>
                </div>

                <div class="flex flex-wrap items-center gap-3 mt-6">
                  <button onclick="copiarFicha()" class="px-5 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-semibold transition-all">
                    <i class="fas fa-copy mr-2"></i>Copiar ficha para submissão
                  </button>
                  <button onclick="limparFicha()" class="px-5 py-3 bg-slate-700/40 hover:bg-slate-700/60 text-slate-300 rounded-lg text-sm font-semibold transition-all">
                    <i class="fas fa-eraser mr-2"></i>Limpar
                  </button>
                  <span id="ficha-status" class="text-sm text-green-400 font-semibold"></span>
                </div>
              </div>

              <div class="card rounded-xl p-6 border-l-4 border-l-blue-500">
                <h3 class="text-sm font-bold text-blue-400 uppercase tracking-widest mb-3">
                  <i class="fas fa-calendar-check mr-2"></i> Cadência do comitê de IA
                </h3>
                <p class="text-sm text-slate-300 leading-relaxed">
                  Reúne toda <strong class="text-white">primeira terça do mês</strong>. Ideias com ficha completa entregue até a sexta anterior entram em pauta. Ideias aprovadas (score ≥ 35) recebem <strong class="text-white">sponsor, squad e prazo em até 15 dias úteis</strong>.
                </p>
              </div>
            </div>
          `;
        }
      }

      // ==================== SCORING CALCULATOR ====================
      const weights = {
        impacto: 3,
        eficiencia: 2,
        viabilidade: 2,
        dados: 2,
        risco: 1,
      };

      function recalc() {
        const scTotal = document.getElementById("sc-total");
        if (!scTotal) return;
        let total = 0;
        for (const k in weights) {
          const el = document.getElementById(`sc-${k}`);
          if (!el) return;
          total += Number(el.value) * weights[k];
        }
        scTotal.textContent = total;
        const v = document.getElementById("sc-verdict");
        const d = document.getElementById("sc-desc");
        if (total >= 35) {
          v.className =
            "verdict go px-4 py-3 rounded-lg mt-5 text-sm font-bold";
          v.textContent = "Aprovar · entra no portfólio ativo";
          d.textContent =
            "Defina sponsor, squad e prazo em até 15 dias. Submeta a ficha ao próximo comitê.";
        } else if (total >= 25) {
          v.className =
            "verdict piloto px-4 py-3 rounded-lg mt-5 text-sm font-bold";
          v.textContent = "Piloto (30-60 dias)";
          d.textContent =
            "Rode uma PoC controlada com critério de saída antes de comprometer o portfólio.";
        } else {
          v.className =
            "verdict nogo px-4 py-3 rounded-lg mt-5 text-sm font-bold";
          v.textContent = "Reprovar · retorna ao backlog";
          d.textContent =
            "Investigue: falta sponsor? Dados? Problema claro? Retorne quando mudar.";
        }
      }

      // ==================== ROI SIMULATOR ====================
      function calcRoi() {
        const bEl = document.getElementById("roi-b");
        if (!bEl) return;
        const B = +bEl.value || 0;
        const C0 = +document.getElementById("roi-c0").value || 0;
        const Cr = +document.getElementById("roi-cr").value || 0;
        const H = Math.max(1, +document.getElementById("roi-h").value || 3);

        const custoAno1 = C0 + Cr;
        const roiAno1 = custoAno1 > 0 ? ((B - custoAno1) / custoAno1) * 100 : 0;

        const custoH = C0 + Cr * H;
        const beneficioH = B * H;
        const roiH = custoH > 0 ? ((beneficioH - custoH) / custoH) * 100 : 0;

        const beneficioLiquidoMensal = (B - Cr) / 12;
        const payback =
          beneficioLiquidoMensal > 0 ? C0 / beneficioLiquidoMensal : Infinity;

        const ganhoLiquido = beneficioH - custoH;

        const fmtPct = (v) => (isFinite(v) ? `${v.toFixed(0)}%` : "—");
        const fmtMes = (v) => (isFinite(v) ? `${v.toFixed(1)} meses` : "∞");
        const fmtRS = (v) => `R$ ${Math.round(v).toLocaleString("pt-BR")}`;

        const setVal = (id, text, good) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.textContent = text;
          el.className =
            "k-val text-2xl font-black font-mono " +
            (good === "good"
              ? "text-green-400"
              : good === "warn"
                ? "text-amber-400"
                : good === "bad"
                  ? "text-red-400"
                  : "text-slate-300");
        };

        setVal(
          "roi-ano1",
          fmtPct(roiAno1),
          roiAno1 >= 50 ? "good" : roiAno1 >= 0 ? "warn" : "bad",
        );
        setVal(
          "roi-horizonte",
          fmtPct(roiH),
          roiH >= 100 ? "good" : roiH >= 0 ? "warn" : "bad",
        );
        setVal(
          "roi-payback",
          fmtMes(payback),
          payback <= 12 ? "good" : payback <= 18 ? "warn" : "bad",
        );
        setVal(
          "roi-liquido",
          fmtRS(ganhoLiquido),
          ganhoLiquido >= 0 ? "good" : "bad",
        );
      }

      // ==================== FICHA ====================
      function copiarFicha() {
        const v = (id) => document.getElementById(id).value.trim() || "—";
        const texto = [
          "=== FICHA DE AVALIAÇÃO · Priorização e ROI em IA ===",
          `Ideia: ${v("f-nome")}`,
          `Sponsor: ${v("f-sponsor")}`,
          `Problema: ${v("f-problema")}`,
          `KPI: ${v("f-kpi")}`,
          `Score da matriz: ${v("f-score")} / 50`,
          `ROI (3 anos): ${v("f-roi")}`,
          `Payback: ${v("f-payback")}`,
          `Data: ${new Date().toLocaleDateString("pt-BR")}`,
        ].join("\n");
        const status = document.getElementById("ficha-status");
        if (navigator.clipboard) {
          navigator.clipboard.writeText(texto).then(
            () => {
              status.textContent = "Copiado! Cole no e-mail do comitê.";
              setTimeout(() => (status.textContent = ""), 4000);
            },
            () => {
              status.textContent = "Falha ao copiar. Veja o console.";
              console.log(texto);
            },
          );
        } else {
          console.log(texto);
          status.textContent = "Ficha no console (clipboard indisponível).";
        }
      }

      function limparFicha() {
        [
          "f-nome",
          "f-sponsor",
          "f-problema",
          "f-kpi",
          "f-score",
          "f-roi",
          "f-payback",
        ].forEach((id) => (document.getElementById(id).value = ""));
        document.getElementById("ficha-status").textContent = "";
      }

      // ==================== INIT ====================
      router("dashboard");
    </script>
  </body>
</html>
