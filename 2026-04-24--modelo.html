      body {
        font-family: "Inter", sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }

        background: #1e293b;
      }

        background: #475569;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      .nav-item {
        border-left: 3px solid transparent;
        transition: all 0.2s ease;
      }
      .nav-item:hover {
        background: rgba(59, 130, 246, 0.1);
      }
      .nav-item.active {
        border-left-color: #3b82f6;
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
      }

      .submenu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }
      .submenu.open {
        max-height: 500px;
      }
      .submenu-item {
        font-size: 0.8rem;
        padding: 0.5rem 1rem 0.5rem 3rem;
      }

      .card {
        background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
        border: 1px solid #334155;
        transition: all 0.3s ease;
      }
      .card:hover {
        border-color: #3b82f6;
        transform: translateY(-2px);
        box-shadow: 0 8px 30px -10px rgba(59, 130, 246, 0.3);
      }

      .code-block {
        background: #0c0f14;
        border: 1px solid #1e293b;
        border-radius: 8px;
        font-family: "JetBrains Mono", monospace;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(4px);
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal-content {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 1rem;
        max-width: 90vw;
        max-height: 90vh;
        overflow-y: auto;
      }

      .shell-tab {
        cursor: pointer;
        padding: 8px 16px;
        border-radius: 6px 6px 0 0;
        font-size: 12px;
        font-weight: 600;
        transition: all 0.2s;
      }
      .shell-tab.active {
        background: #0c0f14;
        color: #3b82f6;
      }
      .shell-tab:not(.active) {
        background: #1e293b;
        color: #64748b;
      }

      .copy-btn {
        opacity: 0;
        transition: opacity 0.2s;
      }
      .code-block:hover .copy-btn {
        opacity: 1;
      }

      .check-item {
        transition: all 0.2s;
      }
      .check-item:hover {
        background: rgba(59, 130, 246, 0.1);
      }
      .check-item input:checked + label {
        color: #22c55e;
        text-decoration: line-through;
      }

      .fade-in {
        animation: fadeIn 0.4s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>

    <script>
      // ==================== STATE ====================
      let currentRoute = "dashboard";
      let currentShell = "powershell";
      let openSubmenus = [];

      // ==================== DATA ====================
      const timelineItems = [
        { time: "08:00", title: "Boas-vindas", duration: "10min" },
        { time: "08:10", title: "Apresentação do Curso", duration: "20min" },
        { time: "08:30", title: "Detalhamento Módulo 1", duration: "15min" },
        { time: "08:45", title: "O que são Agentes de IA?", duration: "30min" },
        { time: "09:15", title: "Níveis de Agentes", duration: "25min" },
        { time: "09:40", title: "Intervalo", duration: "10min" },
        { time: "09:50", title: "Anatomia do Agente", duration: "30min" },
        { time: "10:20", title: "Ambiente Vertex AI", duration: "20min" },
        { time: "10:40", title: "Validação do Setup", duration: "20min" },
      ];

      const shellCommands = {
        powershell: {
          python: `# Verificar versão do Python\npython --version\n# Resultado esperado: Python 3.10+ (recomendado 3.11)`,
          venv: `# Criar ambiente virtual\npython -m venv .venv\n\n# Ativar ambiente virtual (PowerShell)\n.\\.venv\\Scripts\\Activate.ps1\n\n# Verificar se ativou (deve aparecer (.venv) no prompt)`,
          gcloud: `# Verificar instalação do Google Cloud CLI\ngcloud --version\n\n# Autenticar na sua conta Google\ngcloud auth login\n\n# Configurar Application Default Credentials (ADC)\ngcloud auth application-default login\n\n# Configurar projeto (substitua pelo seu PROJECT_ID)\ngcloud config set project SEU_PROJECT_ID\n\n# Verificar configuração\ngcloud config list`,
          adk: `# Instalar Google ADK\npip install google-adk\n\n# Verificar instalação\nadk --version\n\n# Criar primeiro projeto de agente\nadk init meu-primeiro-agente\n\n# Entrar no diretório criado\ncd meu-primeiro-agente\n\n# Ver estrutura do projeto\nGet-ChildItem -Recurse`,
        },
        bash: {
          python: `# Verificar versão do Python\npython3 --version\n# Resultado esperado: Python 3.10+ (recomendado 3.11)`,
          venv: `# Criar ambiente virtual\npython3 -m venv .venv\n\n# Ativar ambiente virtual (Bash/Linux/Mac)\nsource .venv/bin/activate\n\n# Verificar se ativou (deve aparecer (.venv) no prompt)`,
          gcloud: `# Verificar instalação do Google Cloud CLI\ngcloud --version\n\n# Autenticar na sua conta Google\ngcloud auth login\n\n# Configurar Application Default Credentials (ADC)\ngcloud auth application-default login\n\n# Configurar projeto (substitua pelo seu PROJECT_ID)\ngcloud config set project SEU_PROJECT_ID\n\n# Verificar configuração\ngcloud config list`,
          adk: `# Instalar Google ADK\npip install google-adk\n\n# Verificar instalação\nadk --version\n\n# Criar primeiro projeto de agente\nadk init meu-primeiro-agente\n\n# Entrar no diretório criado\ncd meu-primeiro-agente\n\n# Ver estrutura do projeto\nls -la`,
        },
        cmd: {
          python: `REM Verificar versão do Python\npython --version\nREM Resultado esperado: Python 3.10+ (recomendado 3.11)`,
          venv: `REM Criar ambiente virtual\npython -m venv .venv\n\nREM Ativar ambiente virtual (CMD)\n.venv\\Scripts\\activate.bat\n\nREM Verificar se ativou (deve aparecer (.venv) no prompt)`,
          gcloud: `REM Verificar instalação do Google Cloud CLI\ngcloud --version\n\nREM Autenticar na sua conta Google\ngcloud auth login\n\nREM Configurar Application Default Credentials (ADC)\ngcloud auth application-default login\n\nREM Configurar projeto (substitua pelo seu PROJECT_ID)\ngcloud config set project SEU_PROJECT_ID\n\nREM Verificar configuração\ngcloud config list`,
          adk: `REM Instalar Google ADK\npip install google-adk\n\nREM Verificar instalação\nadk --version\n\nREM Criar primeiro projeto de agente\nadk init meu-primeiro-agente\n\nREM Entrar no diretório criado\ncd meu-primeiro-agente\n\nREM Ver estrutura do projeto\ndir /s`,
        },
      };

      // ==================== NAVIGATION ====================
      function router(route) {
        currentRoute = route;
        document
          .querySelectorAll(".nav-item")
          .forEach((el) => el.classList.remove("active"));

        const main = document.getElementById("main-content");
        main.innerHTML = "";

        // Split route to handle nested routes
        const [section, subsection] = route.split("/");

        switch (section) {
          case "dashboard":
            renderDashboard(main);
            break;
          case "agentes":
            renderAgentes(main, subsection);
            break;
          case "niveis":
            renderNiveis(main);
            break;
          case "anatomia":
            renderAnatomia(main, subsection);
            break;
          case "vertex":
            renderVertex(main, subsection);
            break;
          case "tokens":
            renderTokens(main, subsection);
            break;
          case "lab-custos":
            renderLabCustos(main);
            break;
        }
      }

      function toggleSubmenu(name) {
        const submenu = document.getElementById(`submenu-${name}`);
        const icon = document.getElementById(`icon-${name}`);

        if (submenu.classList.contains("open")) {
          submenu.classList.remove("open");
          icon.style.transform = "rotate(0deg)";
          openSubmenus = openSubmenus.filter((s) => s !== name);
        } else {
          submenu.classList.add("open");
          icon.style.transform = "rotate(180deg)";
          openSubmenus.push(name);
        }
      }

      // ==================== MODALS ====================
      function openModal(type) {
        const modal = document.getElementById(`modal-${type}`);
        modal.classList.add("active");

        if (type === "setup") renderSetupContent();
        if (type === "vertexai") renderVertexAIContent();
      }

      function closeModal(event, type) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById(`modal-${type}`).classList.remove("active");

      // ==================== HELPERS ====================
      function copyCode(button) {
        const pre = button.parentElement.querySelector("pre");
        navigator.clipboard.writeText(pre.textContent);
        button.innerHTML = '<i class="fas fa-check mr-1"></i>Copiado!';
        setTimeout(() => {
          button.innerHTML = '<i class="fas fa-copy mr-1"></i>Copiar';
        }, 2000);
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function updateProgress() {
        const checkboxes = document.querySelectorAll('[id^="check-"]');
        const checked = document.querySelectorAll(
          '[id^="check-"]:checked',
        ).length;
        const total = checkboxes.length;
        const percentage = (checked / total) * 100;

        document.getElementById("progress-bar").style.width = percentage + "%";
        document.getElementById("progress-text").textContent =
          `${checked}/${total}`;
      }

      // ==================== INIT ====================
      document.addEventListener("DOMContentLoaded", () => {
        router("dashboard");
      });
