<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Aula: A2A — Agent-to-Agent Protocol | BV Agent Engineering
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }
      .font-mono { font-family: "JetBrains Mono", monospace; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #1e293b; }
      ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #64748b; }

      .nav-item {
        border-left: 3px solid transparent;
        transition: all 0.2s ease;
      }
      .nav-item:hover { background: rgba(59, 130, 246, 0.1); }
      .nav-item.active {
        border-left-color: #3b82f6;
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
      }

      .submenu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }
      .submenu.open { max-height: 900px; }
      .submenu-item {
        font-size: 0.8rem;
        padding: 0.5rem 1rem 0.5rem 3rem;
      }

      .card {
        background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
        border: 1px solid #334155;
        transition: all 0.3s ease;
      }
      .card:hover {
        border-color: #3b82f6;
        transform: translateY(-2px);
        box-shadow: 0 8px 30px -10px rgba(59, 130, 246, 0.3);
      }
      .card.no-hover:hover { transform: none; box-shadow: none; border-color: #334155; }

      .code-block {
        background: #0c0f14;
        border: 1px solid #1e293b;
        border-radius: 8px;
        font-family: "JetBrains Mono", monospace;
        position: relative;
      }
      .copy-btn { opacity: 0; transition: opacity 0.2s; }
      .code-block:hover .copy-btn { opacity: 1; }
      pre { white-space: pre; overflow-x: auto; }

      /* syntax highlighting classes */
      .tk-k { color: #c084fc; }      /* keyword */
      .tk-s { color: #86efac; }      /* string */
      .tk-n { color: #fbbf24; }      /* number */
      .tk-c { color: #64748b; font-style: italic; } /* comment */
      .tk-f { color: #60a5fa; }      /* function/method */
      .tk-t { color: #f472b6; }      /* type */
      .tk-p { color: #e2e8f0; }      /* plain */
      .tk-prop { color: #38bdf8; }   /* json property */

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .fade-in { animation: fadeIn 0.4s ease-out; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .arrow-flow::after {
        content: "▶";
        position: absolute;
        right: -14px;
        top: 50%;
        transform: translateY(-50%);
        color: #3b82f6;
        font-size: 14px;
      }

      .lifecycle-node {
        position: relative;
        padding: 10px 14px;
        border-radius: 10px;
        background: linear-gradient(145deg, #1e293b, #0f172a);
        border: 1px solid #334155;
        font-weight: 600;
        font-size: 12px;
        color: #e2e8f0;
      }
      .lifecycle-node.state-submitted { border-color: #60a5fa; color: #60a5fa; }
      .lifecycle-node.state-working { border-color: #facc15; color: #facc15; }
      .lifecycle-node.state-input { border-color: #fb923c; color: #fb923c; }
      .lifecycle-node.state-completed { border-color: #34d399; color: #34d399; }
      .lifecycle-node.state-failed { border-color: #f87171; color: #f87171; }

      .kbd {
        font-family: "JetBrains Mono", monospace;
        background: #0c0f14;
        border: 1px solid #334155;
        border-bottom-width: 2px;
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 12px;
      }

      table.spec-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      table.spec-table th,
      table.spec-table td {
        padding: 10px 12px;
        border-bottom: 1px solid #334155;
        text-align: left;
        vertical-align: top;
      }
      table.spec-table th {
        background: #0c0f14;
        color: #60a5fa;
        font-weight: 700;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.06em;
      }
      table.spec-table tr:hover td { background: rgba(59, 130, 246, 0.05); }

      .anchor-link {
        color: #3b82f6;
        text-decoration: underline;
        text-decoration-color: rgba(59, 130, 246, 0.4);
        text-underline-offset: 3px;
      }
      .anchor-link:hover { color: #60a5fa; }

      details > summary {
        cursor: pointer;
        user-select: none;
        list-style: none;
      }
      details > summary::-webkit-details-marker { display: none; }
      details > summary::before {
        content: "▶";
        display: inline-block;
        margin-right: 8px;
        transition: transform 0.2s;
        color: #3b82f6;
      }
      details[open] > summary::before { transform: rotate(90deg); }

      .mermaid { text-align: center; }
    </style>
  </head>
  <body class="flex flex-col h-screen overflow-hidden">
    <!-- Header Navbar -->
    <header
      class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center justify-between z-30"
    >
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
            <i class="fas fa-network-wired text-white"></i>
          </div>
          <div>
            <h1 class="text-lg font-bold text-white">Agent Engineering</h1>
            <p class="text-[10px] text-slate-500 font-semibold uppercase tracking-widest">
              Aula — A2A Protocol Deep Dive
            </p>
          </div>
        </div>
      </div>
      <nav class="flex gap-3 items-center">
        <span class="pill bg-green-600/20 text-green-400"><i class="fas fa-circle text-[8px]"></i> v0.3.0</span>
        <span class="pill bg-purple-600/20 text-purple-400"><i class="fab fa-linux"></i> Linux Foundation</span>
        <a
          href="https://a2a-protocol.org/latest/specification/"
          target="_blank"
          class="px-4 py-2 bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 rounded-lg text-sm font-semibold transition-all"
        >
          <i class="fas fa-book mr-2"></i>Spec Oficial
        </a>
      </nav>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- Sidebar -->
      <aside class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col flex-shrink-0 overflow-y-auto">
        <div class="p-4 mx-4 mt-4 bg-blue-600/10 border border-blue-600/30 rounded-xl">
          <div class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mb-1">Aula especial</div>
          <div class="text-sm font-bold text-white leading-tight">A2A — Agent-to-Agent Protocol</div>
          <div class="text-xs text-slate-400 mt-2">
            <i class="fas fa-clock mr-1"></i> ~4h de estudo &middot; profundidade técnica
          </div>
        </div>

        <nav class="flex-1 py-4">
          <div class="px-4 mb-2">
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Navegação</span>
          </div>
          <ul class="space-y-1 px-2" id="nav-root"></ul>
        </nav>

        <div class="p-4 text-[10px] text-slate-600 border-t border-slate-800">
          Banco BV &middot; FIAP Agent Engineering &middot; Aula construída a partir da implementação real deste repositório.
        </div>
      </aside>

      <!-- Main -->
      <main id="main-content" class="flex-1 overflow-y-auto bg-slate-950"></main>
    </div>

    <script>
      // ==================== NAV DEFINITION ====================
      const NAV = [
        { route: "dashboard", icon: "fa-home", label: "Dashboard" },
        {
          key: "fundamentos",
          icon: "fa-lightbulb",
          label: "Fundamentos",
          children: [
            { route: "fundamentos/o-que-e", label: "O que é A2A?" },
            { route: "fundamentos/motivacao", label: "Motivação e problema" },
            { route: "fundamentos/posicao", label: "Posição no ecossistema" },
            { route: "fundamentos/a2a-vs-mcp", label: "A2A vs MCP" },
            { route: "fundamentos/historia", label: "História e governança" },
          ],
        },
        {
          key: "arquitetura",
          icon: "fa-cubes",
          label: "Arquitetura",
          children: [
            { route: "arquitetura/atores", label: "Atores e papéis" },
            { route: "arquitetura/agent-card", label: "Agent Card" },
            { route: "arquitetura/executor", label: "Agent Executor" },
            { route: "arquitetura/task-manager", label: "Task Manager" },
            { route: "arquitetura/push", label: "Push Notifications" },
          ],
        },
        {
          key: "protocolo",
          icon: "fa-plug",
          label: "Protocolo",
          children: [
            { route: "protocolo/jsonrpc", label: "JSON-RPC 2.0" },
            { route: "protocolo/metodos", label: "Métodos A2A" },
            { route: "protocolo/streaming", label: "Streaming (SSE)" },
            { route: "protocolo/transports", label: "Transports" },
            { route: "protocolo/well-known", label: "Discovery & Well-Known" },
          ],
        },
        {
          key: "mensagens",
          icon: "fa-envelope-open-text",
          label: "Mensagens & Tasks",
          children: [
            { route: "mensagens/message", label: "Message e Parts" },
            { route: "mensagens/task-lifecycle", label: "Task Lifecycle" },
            { route: "mensagens/artifacts", label: "Artifacts" },
            { route: "mensagens/errors", label: "Erros padronizados" },
          ],
        },
        {
          key: "seguranca",
          icon: "fa-shield-halved",
          label: "Segurança",
          children: [
            { route: "seguranca/auth", label: "Autenticação" },
            { route: "seguranca/authz", label: "Autorização" },
            { route: "seguranca/tls", label: "TLS e boas práticas" },
          ],
        },
        {
          key: "implementacao",
          icon: "fa-code",
          label: "Implementação (ADK)",
          children: [
            { route: "implementacao/adk", label: "Google ADK para A2A" },
            { route: "implementacao/servidor", label: "Construindo o servidor" },
            { route: "implementacao/cliente", label: "Construindo o cliente" },
            { route: "implementacao/projeto-bv", label: "Estudo de caso: Banco BV" },
            { route: "implementacao/trace-real", label: "Trace real ponta-a-ponta" },
          ],
        },
        {
          key: "ops",
          icon: "fa-stethoscope",
          label: "Ops & Troubleshooting",
          children: [
            { route: "ops/checklist", label: "Checklist de produção" },
            { route: "ops/erros-comuns", label: "Erros comuns (vividos)" },
            { route: "ops/debug", label: "Técnicas de debug" },
          ],
        },
        {
          key: "comparativos",
          icon: "fa-scale-balanced",
          label: "Comparativos",
          children: [
            { route: "comparativos/mcp", label: "A2A × MCP" },
            { route: "comparativos/langgraph", label: "A2A × LangGraph subagents" },
            { route: "comparativos/openai", label: "A2A × OpenAI Assistants" },
          ],
        },
        { route: "referencias", icon: "fa-book-open", label: "Referências" },
      ];

      let currentRoute = "dashboard";
      let openSubmenus = new Set();

      function buildNav() {
        const root = document.getElementById("nav-root");
        root.innerHTML = NAV.map((item) => {
          if (item.children) {
            const sub = item.children
              .map(
                (c) => `
                <li>
                  <button onclick="router('${c.route}')" id="nav-${c.route.replace(/\//g, "-")}"
                    class="submenu-item nav-item w-full text-left text-slate-400 hover:text-white rounded-r-lg">
                    ${c.label}
                  </button>
                </li>`,
              )
              .join("");
            return `
              <li>
                <button onclick="toggleSubmenu('${item.key}')"
                  class="nav-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium flex items-center justify-between">
                  <span><i class="fas ${item.icon} w-6 text-slate-400"></i> ${item.label}</span>
                  <i class="fas fa-chevron-down text-slate-500 transition-transform" id="icon-${item.key}"></i>
                </button>
                <ul class="submenu" id="submenu-${item.key}">${sub}</ul>
              </li>`;
          }
          return `
            <li>
              <button onclick="router('${item.route}')" id="nav-${item.route}"
                class="nav-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium">
                <i class="fas ${item.icon} w-6 text-slate-400"></i> ${item.label}
              </button>
            </li>`;
        }).join("");
      }

      function toggleSubmenu(name) {
        const submenu = document.getElementById(`submenu-${name}`);
        const icon = document.getElementById(`icon-${name}`);
        if (submenu.classList.contains("open")) {
          submenu.classList.remove("open");
          icon.style.transform = "rotate(0deg)";
          openSubmenus.delete(name);
        } else {
          submenu.classList.add("open");
          icon.style.transform = "rotate(180deg)";
          openSubmenus.add(name);
        }
      }

      function ensureParentOpen(route) {
        const parent = NAV.find((n) => n.children && n.children.some((c) => c.route === route));
        if (parent && !openSubmenus.has(parent.key)) toggleSubmenu(parent.key);
      }

      function router(route) {
        currentRoute = route;
        document.querySelectorAll(".nav-item").forEach((el) => el.classList.remove("active"));
        const btn = document.getElementById(`nav-${route.replace(/\//g, "-")}`);
        if (btn) btn.classList.add("active");
        ensureParentOpen(route);

        const main = document.getElementById("main-content");
        main.innerHTML = "";
        main.scrollTop = 0;

        const renderer = RENDERERS[route] || RENDERERS["dashboard"];
        renderer(main);
      }

      function copyCode(btn) {
        const pre = btn.parentElement.querySelector("pre");
        const text = pre.innerText;
        navigator.clipboard.writeText(text).then(() => {
          const orig = btn.innerHTML;
          btn.innerHTML = '<i class="fas fa-check mr-1"></i>Copiado';
          setTimeout(() => (btn.innerHTML = orig), 1500);
        });
      }

      function codeBlock(lang, html) {
        return `
          <div class="code-block m-0">
            <button onclick="copyCode(this)" class="copy-btn absolute top-2 right-2 px-2 py-1 bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs rounded z-10">
              <i class="fas fa-copy mr-1"></i>Copiar
            </button>
            <div class="px-4 py-2 border-b border-slate-800 text-[10px] uppercase tracking-wider text-slate-500 font-semibold flex items-center justify-between">
              <span><i class="fas fa-code mr-2 text-blue-400"></i>${lang}</span>
            </div>
            <pre class="p-4 text-sm leading-relaxed">${html}</pre>
          </div>`;
      }

      function section(title, icon, body) {
        return `
          <section class="mb-10">
            <h2 class="text-2xl font-bold text-white mb-4 flex items-center gap-3">
              <span class="w-8 h-8 bg-blue-600/20 text-blue-400 rounded-lg flex items-center justify-center">
                <i class="fas ${icon}"></i>
              </span>
              ${title}
            </h2>
            ${body}
          </section>`;
      }

      function pageHeader(kicker, title, lead) {
        return `
          <div class="mb-10 fade-in">
            <div class="text-blue-400 text-xs font-bold uppercase tracking-widest mb-2">
              <i class="fas fa-bookmark mr-2"></i>${kicker}
            </div>
            <h1 class="text-4xl font-black text-white mb-3">${title}</h1>
            <p class="text-slate-400 text-lg max-w-4xl leading-relaxed">${lead}</p>
          </div>`;
      }

      function callout(variant, icon, title, html) {
        const map = {
          info: ["bg-blue-600/10", "border-blue-600/40", "text-blue-400"],
          warn: ["bg-amber-600/10", "border-amber-600/40", "text-amber-400"],
          danger: ["bg-red-600/10", "border-red-600/40", "text-red-400"],
          ok: ["bg-green-600/10", "border-green-600/40", "text-green-400"],
          tip: ["bg-purple-600/10", "border-purple-600/40", "text-purple-400"],
        };
        const [bg, bd, tx] = map[variant] || map.info;
        return `
          <div class="${bg} border ${bd} rounded-xl p-4 mb-4 flex gap-3">
            <i class="fas ${icon} ${tx} mt-1"></i>
            <div>
              <div class="${tx} font-bold text-sm mb-1">${title}</div>
              <div class="text-slate-300 text-sm leading-relaxed">${html}</div>
            </div>
          </div>`;
      }

      function kv(k, v) {
        return `<span class="font-mono text-[11px] bg-slate-800 border border-slate-700 rounded px-2 py-0.5 text-slate-300">${k}=<span class="text-amber-300">${v}</span></span>`;
      }

      // ==================== RENDERERS ====================
      const RENDERERS = {};

      // --------- DASHBOARD ---------
      RENDERERS["dashboard"] = function (c) {
        c.innerHTML = `
          <div class="p-8 fade-in">
            ${pageHeader(
              "Aula especial — Protocolo A2A",
              "Agent-to-Agent: como agentes de IA conversam entre si",
              "Esta aula explica do zero ao nível operacional o <strong>Agent-to-Agent Protocol (A2A)</strong> — o padrão aberto, mantido pela Linux Foundation, que permite que agentes autônomos construídos em frameworks diferentes (Google ADK, LangGraph, CrewAI, AutoGen, custom) descubram, negociem capacidades e executem tarefas uns dos outros sem acoplamento de código. Todo o material é ancorado na <strong>implementação real do orquestrador LangGraph + Risk Specialist deste repositório</strong>."
            )}

            <div class="grid grid-cols-4 gap-4 mb-8">
              ${[
                { label: "Versão da Spec", value: "v0.3.0", icon: "fa-code-branch" },
                { label: "Transporte padrão", value: "JSON-RPC 2.0", icon: "fa-plug" },
                { label: "Governança", value: "Linux Foundation", icon: "fab fa-linux" },
                { label: "Anunciado por", value: "Google, abril/2025", icon: "fab fa-google" },
              ]
                .map(
                  (s) => `
                  <div class="card rounded-xl p-5">
                    <div class="flex items-center justify-between mb-2">
                      <div class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">${s.label}</div>
                      <i class="fas ${s.icon} text-slate-600"></i>
                    </div>
                    <div class="text-xl font-bold text-white">${s.value}</div>
                  </div>`
                )
                .join("")}
            </div>

            ${section(
              "Por que esta aula importa",
              "fa-compass",
              `
              <div class="grid grid-cols-3 gap-6">
                <div class="card rounded-xl p-6">
                  <div class="w-10 h-10 bg-blue-600/20 rounded-lg flex items-center justify-center mb-4">
                    <i class="fas fa-puzzle-piece text-blue-400"></i>
                  </div>
                  <h3 class="font-bold text-white mb-2">Interoperabilidade real</h3>
                  <p class="text-sm text-slate-400">Seu orquestrador em LangGraph conversa com um especialista em Google ADK sem gambiarra. Cada agente fica no framework onde é mais forte.</p>
                </div>
                <div class="card rounded-xl p-6">
                  <div class="w-10 h-10 bg-purple-600/20 rounded-lg flex items-center justify-center mb-4">
                    <i class="fas fa-shield-halved text-purple-400"></i>
                  </div>
                  <h3 class="font-bold text-white mb-2">Padrão aberto e auditável</h3>
                  <p class="text-sm text-slate-400">JSON-RPC 2.0 + HTTP(S) + SSE. Versionado (v0.3.0), com schema publicado e governança comunitária (LF AI & Data).</p>
                </div>
                <div class="card rounded-xl p-6">
                  <div class="w-10 h-10 bg-green-600/20 rounded-lg flex items-center justify-center mb-4">
                    <i class="fas fa-building-columns text-green-400"></i>
                  </div>
                  <h3 class="font-bold text-white mb-2">Aplicabilidade em banking</h3>
                  <p class="text-sm text-slate-400">Regulação bancária exige separação de responsabilidades e trilhas de auditoria. A2A materializa esse particionamento entre agentes.</p>
                </div>
              </div>`
            )}

            ${section(
              "Cenário do laboratório",
              "fa-diagram-project",
              `
              <div class="card no-hover rounded-xl p-8">
                <p class="text-slate-300 mb-6">Vamos usar como fio condutor o sistema deste repositório. O <strong class="text-blue-400">Orquestrador LangGraph</strong> avalia, via RAG, se precisa consultar um especialista e delega a análise regulatória ao <strong class="text-purple-400">Risk Specialist</strong> construído em Google ADK — tudo por A2A.</p>
                <div class="flex items-center justify-center gap-3 flex-wrap">
                  <div class="card rounded-lg p-4 w-48 text-center relative arrow-flow">
                    <i class="fas fa-user text-slate-400 text-2xl mb-2"></i>
                    <div class="font-bold text-white text-sm">Gestor de Conta</div>
                    <div class="text-[10px] text-slate-500">usuário humano</div>
                  </div>
                  <div class="card rounded-lg p-4 w-48 text-center relative arrow-flow" style="border-color:#3b82f6">
                    <i class="fas fa-sitemap text-blue-400 text-2xl mb-2"></i>
                    <div class="font-bold text-white text-sm">Orquestrador</div>
                    <div class="text-[10px] text-blue-400">LangGraph</div>
                  </div>
                  <div class="card rounded-lg p-4 w-48 text-center relative arrow-flow" style="border-color:#a855f7">
                    <span class="pill bg-purple-600/20 text-purple-400 mb-2"><i class="fas fa-network-wired"></i> A2A</span>
                    <div class="font-bold text-white text-sm">Protocolo A2A</div>
                    <div class="text-[10px] text-purple-400">JSON-RPC / SSE</div>
                  </div>
                  <div class="card rounded-lg p-4 w-48 text-center" style="border-color:#ec4899">
